run:
  timeout: 10m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/terraform-registry/terraform-provider-registry

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
