name: Tests

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build -v ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -v -count=1 -timeout 10m ./internal/client/...

  acc-tests:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start test stack
        run: docker compose -f deployments/docker-compose.test.yml up -d

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/health > /dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "  attempt $i/30 — retrying in 3s"
            sleep 3
          done
          echo "Backend did not become healthy in time"
          docker compose -f deployments/docker-compose.test.yml logs backend
          exit 1

      - name: Seed dev admin user
        run: |
          docker compose -f deployments/docker-compose.test.yml exec -T postgres \
            psql -U registry -d terraform_registry \
            < deployments/seed-dev-admin.sql

      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          TF_REGISTRY_ENDPOINT: "http://localhost:8081"
        run: go test -v -count=1 -timeout 25m ./internal/provider/...

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose -f deployments/docker-compose.test.yml logs backend
